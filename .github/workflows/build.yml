name: Build Aurorachat

on:
  push:
    branches: [ "**" ]
    paths:
      - 'source/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ "**" ]
    paths:
      - 'source/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    container: devkitpro/devkita64:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Project
        run: |
          make

      - name: Upload switch build
        uses: actions/upload-artifact@v7
        with:
          name: aurorachat switch Automatic Build (could be unfinished!)
          path: ./aurorachat-switch.nro
      
      - name: Quick Ping
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{"content": "New switch build. Click the top link at https://github.com/Unitendo/aurorachat-switch/actions/workflows/build.yml . If you dont know how to do this, I will find you."}' \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Setup Java JDK
        uses: actions/setup-java@v5.1.0
        with:
          distribution: zulu
          java-version: '21'
          
      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5.1.0
        with:
          dotnet-version: 8.0
